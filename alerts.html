<!DOCTYPE html>
<html>
<head>
    <title>Alerts</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h1>Security Alerts</h1>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Alert</th>
                <th>Time</th>
            </tr>
        </thead>

        <tbody>

        {% for alert in alerts %}
            <tr>
                <td>{{ alert[0] }}</td>
                <td>{{ alert[1] }}</td>
                <td>{{ alert[2] }}</td>
            </tr>
        {% endfor %}

        </tbody>
    </table>

</div>

</body>
</html>
